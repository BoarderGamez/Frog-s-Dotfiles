# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

#cache
# DONT FORGET TO CREATE THE FOLDER
$cachefolder=~/.cache/frogfiles
$font = Monospace
$anspeed=5
general {
    hide_cursor = false
    ignore_empty_input=true
    fail_timeout=1000
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = nonlinear, 1, 0,1,1,
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, $anspeed, nonlinear
    animation = fadeOut,1, $anspeed, nonlinear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    crossfade_time=0.5
    path = $cachefolder/wallpapers/railway_crossing_light.png
    blur_passes = 0
    brightness=0.8
}

input-field {
    monitor =
    size = 97%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.5) 
    outer_color = rgb(15, 249, 158) rgb(15, 249, 158) 45deg
    check_color = (rgb(255, 153, 238) rgb(102,51,238) 120deg
    fail_color = rgb(102,51,238) rgb(0,102,238) 40deg
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = gib pass
    fail_text = $PAMFAIL
    dots_text_format = >~<
    dots_size = 0.4
    dots_spacing = 0.3
    position = 0,20
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}
label {
    monitor = 
    text = Hiya $USER :3
    font_size = 60
    font_family = $font
    position = 200,-15
    halign = center
    valign = top
}
# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = right
    valign = top
}

